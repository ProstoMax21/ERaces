elf:
  category: "elf"

  gui_config:
    name: "§aЭльф"
    lore: "§aЛесной народ, в гармонии с природой.\n\n§eБонусы:\n§7»  Скорость II в лесах и равнинах.\n§7»  Удвоенный урон и скорость стрел из лука.\n§7»  Метаболизм: расход голода на 25% меньше.\n\n§cМинусы:\n§7»  Только 15 HP (7.5 сердечек).\n§7»  Штраф за ношение брони выше железной — замедление I.\n§7»  Не может есть мясо (вегетарианец).\n§7»  Урон ближнего боя x0.5.\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "OAK_SAPLING"

  max_hp: 15

  hunger_loss_multiplier: 0.75

  slowness_with_iron_and_more_armor: 1

  forbidden_foods:
    - COOKED_BEEF
    - COOKED_PORKCHOP
    - COOKED_MUTTON
    - COOKED_CHICKEN
    - RABBIT_STEW

  weapon_proficiency:
    sword_damage_multiplier: 0.5
    axe_damage_multiplier: 0.5
    mace_damage_multiplier: 0.5
    bow_damage_multiplier: 2.0
    bow_projectile_speed_multiplier: 2.0

  effects_with:
    in_biome:
      - biomes:
          - forest
          - birch_forest
          - taiga
          - plains
          - sunflower_plains
        effects:
          speed: 2

  mana_regeneration_modifiers:
    - condition: "ALWAYS"
      multiplier: 1.10

dark_elf:
  category: "elf"

  gui_config:
    name: "§5Тёмный эльф"
    lore: "§5Народ тьмы, привыкший к глубинам мира.\n\n§eБонусы:\n§7»  Скорость II и регенерация в глубинах.\n§7»  Усиленное восстановление здоровья в тёмных местах.\n\n§cМинусы:\n§7»  Урон от зелий исцеления и регенерации.\n§7»  Слабость к светлой магии.\n\n§dСпособности:\n§7»  Арсенал — призывает специальные стрелы с эффектами.\n§7КД: 5 минут.\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "MACE"

  max_hp: 12

  exclude_from_random: true

  effects_with:
    in_biome:
      - biomes:
          - deep_dark
          - pale_garden
        effects:
          speed: 2
          regeneration: 1
          
  at_light:
  - light_type: "sky"
    min: 10
    max: 15
    effects:
      slowness: 1
      weakness: 1

  weapon_proficiency:
    sword_damage_multiplier: 1.1
    axe_damage_multiplier: 1.1
    mace_damage_multiplier: 1.1

  abilities:
    - arsenal

drow:
  category: "elf"

  gui_config:
    name: "§8Дроу"
    lore: "§8Тёмные эльфы глубин, мастера яда и засад.\n\n§eБонусы:\n§7»  Скорость III в глубинах.\n§7»  Регенерация II в глубинах.\n§7»  Усиленные стрелы тьмы.\n§7»  Доступны уникальные способности.\n\n§cМинусы:\n§7»  Получает урон от исцеления и регенерации.\n§7»  Слабость вдали от тьмы.\n\n§7Способности:\n§7»  Арсенал (КД 5 минут).\n§7»  Обстрел (КД 10 минут).\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "MACE"

  max_hp: 12

  abilities:
    - arsenal
    - arrow_barrage

  effects_with:
    in_biome:
      - biomes:
          - deep_dark
          - pale_garden
        effects:
          speed: 3
          regeneration: 2

    at_light:
      - light_type: "sky"
        min: 12
        max: 15
        effects:
          slowness: 2
          weakness: 1
          

  weapon_proficiency:
    bow_damage_multiplier: 1.25
    bow_projectile_speed_multiplier: 1.25

  exclude_from_random: true




ancient_elf:
  category: "elf"

  gui_config:
    name: "§5Эльф кровавой луны"
    lore: "§5Древний народ, связанный с силой луны и кровью первых эльфов.\n\n§eБонусы:\n§7»  Урон из лука +15%.\n§7»  Скорость полёта стрел +15%.\n§7»  В лесах: Скорость II.\n§7»  В тёмных местах: Ночное зрение.\n\n§cМинусы:\n§7»  Урон от солнечного света.\n§7»  Не может есть мясо.\n§7»  В тёмных лесах получает слабость.\n\n§dСпособности:\n§7» Дух леса.\n§7» Кровь первых.\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "AMETHYST_SHARD"

  max_hp: 14

  exclude_from_random: true


  effects_with:

    # Лесная связь
    in_biome:

      - biomes:
          - forest
          - birch_forest
          - taiga
          - dark_forest
          - flower_forest
        effects:
          speed: 2
          regeneration: 1


      # Тёмные места
      - biomes:
          - deep_dark
          - pale_garden
        effects:
          night_vision: 1


    # Ненависть к солнцу
    at_light:

      - light_type: "sky"
        min: 12
        max: 15
        effects:
          weakness: 1



  forbidden_foods:
    - COOKED_BEEF
    - COOKED_PORK
    - COOKED_MUTTON
    - COOKED_CHICKEN



  weapon_proficiency:

    bow_damage_multiplier: 1.15

    bow_projectile_speed_multiplier:
      1.15

  abilities:

    - forestchild
    - blood_of_first
