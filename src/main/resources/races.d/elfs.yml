asir:
  category: "elf"
  
  gui_config:
    name: "§bАсир"
    lore: "§bСеверный народ, закалённый холодом.\n\n§eБонусы:\n§7»  Восстановление маны +10%.\n§7»  Скорость атаки +15%.\n§7»  Скорость полета стрелы лука +30%.\n§7»  Урон от святого оружия +5%.\n\n§cМинусы:\n§7»  Эффект замерзания в зимних биомах.\n§7»  −25% урона от ближнего оружия.\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "DIAMOND_AXE"
  max_hp: 20
  weapon_proficiency:
    sword_damage_multiplier: 0.75  # -25% урона от меча
    axe_damage_multiplier: 0.75    # -25% урона от топора
    mace_damage_multiplier: 0.75   # -25% урона от булавы
    bow_projectile_speed_multiplier: 1.3  # +30% скорость полета стрелы
    # holy_weapon_damage_multiplier: 1.05  Урон от святого оружия +5%. TODO: реализовать
  effects_with:
    in_biome:
      - biomes:
          - snowy_taiga
          - snowy_plains
          - ice_spikes
          - frozen_river
          - snowy_beach
          - frozen_ocean
        effects:
          slowness: 1  # Эффект замерзания в зимних биомах
  attack_speed_multiplier: 1.15  # +15% скорость атаки
  mana_regeneration_modifiers:
    - condition: "ALWAYS"
      multiplier: 1.10  # +10% восстановление маны

   vaniar:
    category: "elf"

   gui_config:
    name: "§fЭльфСВ/Ваниар"
    lore: "§fВысшие эльфы, наделённые светом.\n\n§eБонусы:\n§7»  Восстановление маны +30%.\n§7»  Скорость атаки +15%.\n§7»  Скорость полёта стрелы +30%.\n\n§cМинусы:\n§7»  Эффект замерзания в зимних биомах.\n§7»  −15% урона от ближнего оружия.\n§7»  В аду: тошнота (20 сек, КД 3 мин), слепота (5 сек, КД 1 мин).\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "SPECTRAL_ARROW"

  max_hp: 26

  weapon_proficiency:
    sword_damage_multiplier: 0.85
    axe_damage_multiplier: 0.85
    mace_damage_multiplier: 0.85
    bow_projectile_speed_multiplier: 1.3

  effects_with:
    in_biome:
      - biomes:
          - snowy_taiga
          - snowy_plains
          - ice_spikes
          - frozen_river
          - snowy_beach
          - frozen_ocean
        effects:
          slowness: 1

    in_world:
      - world: the_nether
        effects:
          nausea: 1
          blindness: 1

  attack_speed_multiplier: 1.15

  mana_regeneration_modifiers:
    - condition: "ALWAYS"
      multiplier: 1.30

