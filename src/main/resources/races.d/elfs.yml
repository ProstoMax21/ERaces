asir:
  category: "elf"

  gui_config:
    name: "§bАсир"
    lore: "§bСеверный народ, закалённый холодом.\n\n§eБонусы:\n§7» Восстановление маны +10%.\n§7» Скорость атаки +15%.\n§7» Скорость полёта стрелы лука +30%.\n§7» Урон от святого оружия +5%.\n\n§cМинусы:\n§7» Эффект замерзания в зимних биомах.\n§7» −25% урона от ближнего оружия.\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "BLUE_ICE"

  max_hp: 20

  weapon_proficiency:
    sword_damage_multiplier: 0.75
    axe_damage_multiplier: 0.75
    mace_damage_multiplier: 0.75
    bow_projectile_speed_multiplier: 1.3

  effects_with:
    in_biome:
      - biomes:
          - snowy_taiga
          - snowy_plains
          - ice_spikes
          - frozen_river
          - snowy_beach
          - frozen_ocean
        effects:
          slowness: 1

  attack_speed_multiplier: 1.15

  mana_regeneration_modifiers:
    - condition: "ALWAYS"
      multiplier: 1.10


